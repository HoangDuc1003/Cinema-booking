<svg viewBox="0 0 1100 260" xmlns="http://www.w3.org/2000/svg">

  <defs>
    <linearGradient id="shadowRed" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#660000" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#000000" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <g transform="translate(30,180)">

    <!-- Shadow -->
    <text
      font-family="Georgia, Times New Roman, serif"
      font-size="160"
      font-weight="700"
      letter-spacing="8"
      fill="url(#shadowRed)"
      transform="translate(0,10)"
    >
      NITROCINE
    </text>

    <!-- Main (N highlighted in primary, rest white) -->
    <text
      font-family="Georgia, Times New Roman, serif"
      font-size="160"
      font-weight="700"
      letter-spacing="8"
    >
      <tspan fill="#f64565">N</tspan><tspan fill="#ffffff">ITROCINE</tspan>
    </text>

    

  </g>

</svg>