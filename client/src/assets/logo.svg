<svg viewBox="0 0 1100 260" xmlns="http://www.w3.org/2000/svg">

  <defs>
    <linearGradient id="mainRed" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ff1f1f"/>
      <stop offset="100%" stop-color="#990000"/>
    </linearGradient>

    <linearGradient id="shadowRed" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#660000" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#000000" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <g transform="translate(30,180)">

    <!-- Shadow -->
    <text
      font-family="Georgia, Times New Roman, serif"
      font-size="140"
      font-weight="700"
      letter-spacing="8"
      fill="url(#shadowRed)"
      transform="translate(0,10)"
    >
      NITROCINE
    </text>

    <!-- Main -->
    <text
      font-family="Georgia, Times New Roman, serif"
      font-size="140"
      font-weight="700"
      letter-spacing="8"
      fill="url(#mainRed)"
    >
      NITROCINE
    </text>

    <!-- Highlight -->
    <text
      font-family="Georgia, Times New Roman, serif"
      font-size="140"
      font-weight="700"
      letter-spacing="8"
      fill="#ff4d4d"
      opacity="0.15"
      transform="translate(0,-2)"
    >
      NITROCINE
    </text>

  </g>

</svg>